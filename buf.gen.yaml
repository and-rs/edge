version: v2
inputs:
  - directory: proto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: backend/gen
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go
    out: backend/gen
    opt:
      - paths=source_relative
  - remote: buf.build/bufbuild/es:v2.5.1
    out: frontend/src
    opt:
      - target=ts
      - import_extension=js
    include_imports: true
