syntax = "proto3";

package api.flight.v1;

option go_package = "github.com/index/stint/backend/gen/api/flight/v1;flightv1";

import "google/protobuf/timestamp.proto";

service FlightService {
  rpc Probe(ProbeRequest) returns (ProbeResponse);
  rpc ListSignals(ListSignalsRequest) returns (ListSignalsResponse);
}

message ProbeRequest {
  google.protobuf.Timestamp client_sent_at = 1;
}

message ProbeResponse {
  google.protobuf.Timestamp client_sent_at = 1;
  google.protobuf.Timestamp server_processed_at = 2;
  float cpu_percent = 3;
  uint64 backend_memory_bytes = 4;
  uint64 uptime_seconds = 5;
}

message ListSignalsRequest {}

message ListSignalsResponse {
  repeated Signal signals = 1;
}

message Signal {
  string headline = 1;
  string source = 2;
  string source_url = 3;
  google.protobuf.Timestamp published_at = 4;
  string market_question = 5;
  string market_url = 6;
  string why_it_matters = 7;
  double score = 8;
}
