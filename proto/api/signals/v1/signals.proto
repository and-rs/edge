syntax = "proto3";

package api.signals.v1;

option go_package = "github.com/index/edge/backend/gen/api/signals/v1;signalsv1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service SignalsService {
  rpc StreamSignals(google.protobuf.Empty) returns (stream SignalHuntEvent);
}

message SignalHuntState {
  repeated Signal signals = 1;
  PipelineStages stages = 2;
  SignalHuntSummary summary = 3;
}

message SignalHuntEvent {
  oneof event {
    PipelineStages stages = 1;
    Signal signal = 2;
    SignalHuntSummary summary = 3;
    SignalHuntDone done = 4;
  }
}

message SignalHuntDone {}

message PipelineStages {
  Stage event_ingest = 1;
  Stage market_ingest = 2;
  Stage ai_judgment = 3;
}

message SignalHuntSummary {
  string text = 1;
  string failure_reason = 2;
}

message Stage {
  StageStatus status = 1;
  string label = 2;
  string detail = 3;
}

enum StageStatus {
  STAGE_STATUS_UNSPECIFIED = 0;
  STAGE_STATUS_READY = 1;
  STAGE_STATUS_RUNNING = 8;
  STAGE_STATUS_UNAVAILABLE = 2;
  STAGE_STATUS_DISABLED = 3;
  STAGE_STATUS_MISCONFIGURED = 4;
  STAGE_STATUS_TIMEOUT = 5;
  STAGE_STATUS_INVALID = 6;
  STAGE_STATUS_SKIPPED = 7;
}

enum MatchType {
  MATCH_TYPE_UNSPECIFIED = 0;
  MATCH_TYPE_NO_MATCH = 1;
  MATCH_TYPE_WATCHLIST = 2;
  MATCH_TYPE_MARKET_LINKED = 3;
}

message Signal {
  string headline = 1;
  string event_source = 2;
  string source_url = 3;
  google.protobuf.Timestamp published_at = 4;
  string market_question = 5;
  string market_url = 6;
  string why_it_matters = 7;
  double score = 8;
  string market_venue = 9;
  double market_volume_24h = 10;
  string market_status = 11;
  MatchType final_match_type = 12;
  Stage ai_judgment = 13;
  string link_state_label = 14;
}